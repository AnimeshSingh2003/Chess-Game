# Backend only — frontend is deployed on Vercel
# After first deploy, set CLIENT_ORIGIN in the Render dashboard
# to your Vercel URL (e.g. https://your-app.vercel.app)
services:
  - type: web
    name: archess-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PORT
        fromService:
          type: web
          name: archess-backend
          property: port
      - key: DB_PATH
        value: ./archess.sqlite
      - key: CLIENT_ORIGIN
        sync: false
